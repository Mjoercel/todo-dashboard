    function App() {

        const cf = {'niedrig':1,'mittel':1.5,'hoch':2.5}[t.complex];
        const ef = t.effort <= 1 ? 0.8 : t.effort <= 5 ? 1 : 1.3;
        return Math.round((t.meaning * 5 * 1.2 * t.feasible) / (cf * ef * 10));
      };

      const stats = {
        total: allTasks.length,

        done: allTasks.filter(t => t.status === 'erledigt').length
